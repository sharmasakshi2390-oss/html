<!DOCTYPE html>
<html>
<head>
    <title>My Page</title>
</head>
<body>

    <h2>To-Do List</h2>

    <!-- Form -->
    <form>
        <!-- Text input -->
        <input type="text" placeholder="Enter task">

        <!-- Submit button -->
        <input type="submit" value="Add Task">
    </form>

    <!-- List with checkboxes -->
    <ul>
        <li>
            <input type="checkbox"> Study HTML
        </li>
        <li>
            <input type="checkbox"> Practice Git
        </li>
        <li>
            <input type="checkbox"> Build Project
        </li>
    </ul>

</body>
</html>
